name: CI

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*.*.*"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  test-unit:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://atiga:atiga@localhost:5432/atiga_db
      JWT_SECRET: this_is_a_local_ci_secret_that_is_long_enough
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test

  test-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: atiga
          POSTGRES_PASSWORD: atiga
          POSTGRES_DB: atiga_db
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U atiga -d atiga_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://atiga:atiga@localhost:5432/atiga_db
      JWT_SECRET: this_is_a_local_ci_secret_that_is_long_enough
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run db:migrate
      - run: npm run test:backend

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ./apps/backend
          push: false
      - uses: docker/build-push-action@v6
        with:
          context: ./apps/frontend
          push: false
